<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>27Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
  <div class="cursor-glow"></div>

<script>
const glow = document.querySelector(".cursor-glow");

document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>
<script>
const card = document.getElementById("tilt-card");

if (card) {
  card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const px = x / rect.width;
    const py = y / rect.height;

    const rotateY = (px - 0.5) * 10;
    const rotateX = (0.5 - py) * 10;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-4px)`;
    card.style.setProperty("--mx", `${px * 100}%`);
    card.style.setProperty("--my", `${py * 100}%`);
  });

  card.addEventListener("mouseenter", () => {
    card.style.transition = "transform 0.12s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease";
  });

  card.addEventListener("mouseleave", () => {
    card.style.transition = "transform 0.45s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease";
    card.style.transform = "rotateX(0deg) rotateY(0deg) translateY(0px)";
    card.style.setProperty("--mx", "50%");
    card.style.setProperty("--my", "50%");
  });
}
</script>
<body>
  <div class="particles"></div>
  <div class="container">
    <div class="hero-card" id="tilt-card">
      <div class="status-row">
        <span class="status-pill">Launching soon</span>
        <span class="status-pill">Simple tools, done well</span>
      </div>

      <img src="logo.png" alt="27Tools logo" class="logo" />

      <p class="tagline">
        A growing collection of useful tools, built to be fast, simple, and genuinely helpful.
      </p>

      <div class="button-row">
        <a href="#" class="app-link">Explore tools</a>
        <a href="privacy.html" class="secondary-link">Privacy</a>
      </div>
    </div>

    <footer>
      <p>© 2026 27Tools • Built by Andrew</p>
    </footer>
  </div>
</body>
</html>
