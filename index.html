<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>27Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
  <div class="cursor-glow"></div>

<script>
const glow = document.querySelector(".cursor-glow");

document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>
<body>
  <div class="container">
    <div class="hero-card">
      <div class="status-row">
        <span class="status-pill">Launching soon</span>
        <span class="status-pill">Simple tools, done well</span>
      </div>

      <img src="logo.png" alt="27Tools logo" class="logo" />

      <p class="tagline">
        A growing collection of useful tools, built to be fast, simple, and genuinely helpful.
      </p>

      <div class="button-row">
        <a href="#" class="app-link">Explore tools</a>
        <a href="privacy.html" class="secondary-link">Privacy</a>
      </div>
    </div>

    <footer>
      <p>© 2026 27Tools • Built by Andrew</p>
    </footer>
  </div>
</body>
</html>
